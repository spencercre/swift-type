<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline'" />
  <title>Swift Speak — Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #e5e5e5;
      padding: 20px 24px;
      user-select: none;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 12px;
      color: #999;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    select {
      width: 100%;
      background: #262626;
      border: 1px solid #404040;
      border-radius: 5px;
      color: #e5e5e5;
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      appearance: none;
    }

    select:focus { border-color: #555; }

    .hint {
      font-size: 11px;
      color: #666;
      margin-top: 5px;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 28px;
      padding-top: 16px;
      border-top: 1px solid #333;
    }

    button.btn-cancel, button.btn-save {
      padding: 7px 18px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .btn-cancel {
      background: transparent;
      border-color: #404040;
      color: #999;
    }

    .btn-cancel:hover { border-color: #555; color: #ccc; }

    .btn-save { background: #fff; color: #000; }
    .btn-save:hover { background: #e5e5e5; }

    .status {
      font-size: 11px;
      color: #22c55e;
      margin-top: 8px;
      min-height: 16px;
    }

  </style>
</head>
<body>
  <h1>Swift Speak Settings</h1>

  <div class="field">
    <label>Microphone</label>
    <select id="mic">
      <option value="default">System Default</option>
    </select>
  </div>

  <div class="field">
    <label>Record Hotkey</label>
    <div style="padding:7px 0;font-size:13px;color:#E8735A;letter-spacing:0.01em;">
      Hold <strong>Ctrl + `</strong> to record, release to transcribe
    </div>
  </div>

  <div class="field">
    <label>Transcription Model</label>
    <select id="model">
      <option value="tiny">Tiny — fastest, least accurate</option>
      <option value="base">Base — recommended</option>
      <option value="small">Small — slower, most accurate</option>
    </select>
  </div>

  <p class="status" id="status"></p>

  <div class="actions">
    <button class="btn-cancel" onclick="window.close()">Cancel</button>
    <button class="btn-save" id="saveBtn">Save</button>
  </div>

  <script src="mic-utils.js"></script>
  <script>
    const api      = window.swiftSpeak;
    const micEl    = document.getElementById("mic");
    const modelEl  = document.getElementById("model");
    const statusEl = document.getElementById("status");
    const saveBtn  = document.getElementById("saveBtn");

    function clearMicOptions() {
      while (micEl.options.length > 1) micEl.remove(1);
    }

    async function init() {
      const settings = await api.getSettings();
      const focusMic = await api.shouldFocusMic();

      const inputs = await SwiftSpeakMic.listInputDevices();
      clearMicOptions();
      inputs.forEach((d) => {
        const opt = document.createElement("option");
        opt.value = d.deviceId;
        opt.textContent = d.label || `(unnamed device ${d.deviceId.slice(0, 6)})`;
        opt.dataset.label = d.label || "";
        opt.dataset.deviceId = d.deviceId;
        micEl.appendChild(opt);
      });

      const saved = settings.microphone;
      let selected = false;
      if (saved && saved.label) {
        const byLabel = inputs.find((d) => d.label === saved.label);
        if (byLabel) {
          micEl.value = byLabel.deviceId;
          selected = true;
        } else if (saved.deviceId) {
          const byId = inputs.find((d) => d.deviceId === saved.deviceId);
          if (byId) {
            micEl.value = byId.deviceId;
            selected = true;
          }
        }
      }
      if (!selected) micEl.value = "default";

      modelEl.value = settings.model ?? "base";

      if (focusMic) {
        micEl.focus();
        try { micEl.showPicker && micEl.showPicker(); } catch {}
      }
    }

    saveBtn.addEventListener("click", async () => {
      saveBtn.disabled = true;
      let microphone = null;
      if (micEl.value && micEl.value !== "default") {
        const opt = micEl.options[micEl.selectedIndex];
        microphone = {
          label: opt.dataset.label || opt.textContent || "",
          deviceId: opt.dataset.deviceId || opt.value,
        };
      }
      await api.saveSettings({
        microphone,
        micUserSelected: true,
        model: modelEl.value,
      });
      statusEl.textContent = "Saved.";
      setTimeout(() => { statusEl.textContent = ""; }, 2000);
      saveBtn.disabled = false;
    });

    init().catch((e) => {
      console.error("[SwiftSpeak] settings init failed:", e);
      statusEl.style.color = "#f87171";
      statusEl.textContent = "Failed to load settings.";
    });
  </script>
</body>
</html>
