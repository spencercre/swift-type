<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline'" />
  <title>Swift Type — Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #e5e5e5;
      padding: 20px 24px;
      user-select: none;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 12px;
      color: #999;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    select {
      width: 100%;
      background: #262626;
      border: 1px solid #404040;
      border-radius: 5px;
      color: #e5e5e5;
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      appearance: none;
    }

    select:focus { border-color: #555; }

    /* Hotkey row */
    .hotkey-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    .hotkey-btn {
      flex: 1;
      background: #262626;
      border: 1px solid #404040;
      border-radius: 5px;
      color: #e5e5e5;
      font-size: 13px;
      font-family: inherit;
      padding: 7px 10px;
      text-align: left;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }

    .hotkey-btn:hover { border-color: #555; }

    .hotkey-btn.listening {
      border-color: #666;
      color: #888;
      background: #1e1e1e;
    }

    .btn-test {
      background: transparent;
      border: 1px solid #404040;
      border-radius: 5px;
      color: #999;
      font-size: 12px;
      font-family: inherit;
      padding: 7px 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-test:hover { border-color: #555; color: #ccc; }

    .hint {
      font-size: 11px;
      color: #666;
      margin-top: 5px;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 28px;
      padding-top: 16px;
      border-top: 1px solid #333;
    }

    button.btn-cancel, button.btn-save {
      padding: 7px 18px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .btn-cancel {
      background: transparent;
      border-color: #404040;
      color: #999;
    }

    .btn-cancel:hover { border-color: #555; color: #ccc; }

    .btn-save { background: #fff; color: #000; }
    .btn-save:hover { background: #e5e5e5; }

    .status {
      font-size: 11px;
      color: #22c55e;
      margin-top: 8px;
      min-height: 16px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 64px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 7px;
      color: #e5e5e5;
      font-size: 12px;
      padding: 10px 16px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <h1>Swift Type Settings</h1>

  <div class="field">
    <label>Microphone</label>
    <select id="mic">
      <option value="default">System Default</option>
    </select>
  </div>

  <div class="field">
    <label>Record Hotkey</label>
    <div class="hotkey-row">
      <button class="hotkey-btn" id="hotkeyBtn" type="button"></button>
      <button class="btn-test" id="testBtn" type="button">Test</button>
    </div>
    <p class="hint">Click the field to capture a new hotkey combination.</p>
  </div>

  <div class="field">
    <label>Transcription Model</label>
    <select id="model">
      <option value="tiny">Tiny — fastest, least accurate</option>
      <option value="base">Base — recommended</option>
      <option value="small">Small — slower, most accurate</option>
    </select>
  </div>

  <p class="status" id="status"></p>

  <div class="actions">
    <button class="btn-cancel" onclick="window.close()">Cancel</button>
    <button class="btn-save" id="saveBtn">Save</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const api       = window.swiftType;
    const micEl     = document.getElementById("mic");
    const hotkeyBtn = document.getElementById("hotkeyBtn");
    const testBtn   = document.getElementById("testBtn");
    const modelEl   = document.getElementById("model");
    const statusEl  = document.getElementById("status");
    const saveBtn   = document.getElementById("saveBtn");
    const toastEl   = document.getElementById("toast");

    // ── Key name mappings ──────────────────────────────────────────────────────

    const KEY_TO_ELECTRON = {
      " ": "Space", "ArrowUp": "Up", "ArrowDown": "Down",
      "ArrowLeft": "Left", "ArrowRight": "Right",
      "Enter": "Return", "Escape": "Escape", "Tab": "Tab",
      "Backspace": "Backspace", "Delete": "Delete",
      "Home": "Home", "End": "End", "PageUp": "PageUp", "PageDown": "PageDown",
    };

    const ELECTRON_TO_WIN = {
      "Control": "Ctrl", "CommandOrControl": "Ctrl",
      "Super": "Win", "Meta": "Win",
      "Return": "Enter", "Escape": "Esc",
    };

    const MODIFIERS = new Set(["Control", "Shift", "Alt", "Meta", "Super"]);

    function electronToDisplay(accelerator) {
      return accelerator
        .split("+")
        .map(tok => ELECTRON_TO_WIN[tok] ?? tok)
        .join("+");
    }

    function eventToElectron(e) {
      const mods = [];
      if (e.ctrlKey)  mods.push("Control");
      if (e.shiftKey) mods.push("Shift");
      if (e.altKey)   mods.push("Alt");
      if (e.metaKey)  mods.push("Super");

      const raw = e.key;
      if (MODIFIERS.has(raw) || raw === "Meta") return null;

      let key = KEY_TO_ELECTRON[raw];
      if (!key) key = raw.length === 1 ? raw.toUpperCase() : raw;
      if (mods.length === 0) return null;

      return [...mods, key].join("+");
    }

    // ── Toast ──────────────────────────────────────────────────────────────────

    let toastTimer = null;

    function showToast(msg) {
      clearTimeout(toastTimer);
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      toastTimer = setTimeout(() => toastEl.classList.remove("show"), 3500);
    }

    // ── Hotkey capture ─────────────────────────────────────────────────────────

    let capturedAccelerator = "CommandOrControl+Shift+Space";

    function updateHotkeyBtn() {
      hotkeyBtn.textContent = electronToDisplay(capturedAccelerator);
    }

    let captureListener = null;

    hotkeyBtn.addEventListener("click", async () => {
      if (captureListener) return;

      hotkeyBtn.classList.add("listening");
      hotkeyBtn.textContent = "Press your hotkey…";

      // Ask main to unregister all shortcuts (so the keypress reaches us)
      // and focus this window. Waits for main to confirm before listening.
      await api.startHotkeyCapture();

      captureListener = (e) => {
        e.preventDefault();
        e.stopPropagation();

        const accelerator = eventToElectron(e);
        if (!accelerator) return;   // modifier-only, keep waiting

        hotkeyBtn.classList.remove("listening");
        hotkeyBtn.textContent = "Registering…";
        window.removeEventListener("keydown", captureListener, true);
        captureListener = null;

        // Send to main: re-registers the shortcut, echoes hotkey-captured back
        api.confirmHotkey(accelerator);
      };

      window.addEventListener("keydown", captureListener, true);
    });

    // Main confirmed the hotkey is registered — update display
    api.onHotkeyCaptured((accelerator) => {
      capturedAccelerator = accelerator;
      updateHotkeyBtn();
    });

    testBtn.addEventListener("click", () => {
      const display = electronToDisplay(capturedAccelerator);
      showToast(`Hotkey active — press ${display} anywhere to record`);
    });

    // ── Init ───────────────────────────────────────────────────────────────────

    async function init() {
      const [settings, devices] = await Promise.all([
        api.getSettings(),
        api.getAudioDevices(),
      ]);

      // Mic dropdown — "System Default" always first, real devices appended
      if (Array.isArray(devices) && devices.length > 0) {
        devices.forEach(d => {
          const opt = document.createElement("option");
          const name = d.name ?? d;
          opt.value = name;
          opt.textContent = d.label ?? name;
          if (settings.microphone === name) opt.selected = true;
          micEl.appendChild(opt);
        });
      }

      // Hotkey — read from saved settings, fall back to current default
      capturedAccelerator = settings.hotkey ?? "CommandOrControl+Shift+Space";
      updateHotkeyBtn();

      modelEl.value = settings.model ?? "base";
    }

    // ── Save ───────────────────────────────────────────────────────────────────

    saveBtn.addEventListener("click", async () => {
      saveBtn.disabled = true;
      await api.saveSettings({
        hotkey:     capturedAccelerator,
        microphone: micEl.value,
        model:      modelEl.value,
      });
      statusEl.textContent = "Saved.";
      setTimeout(() => { statusEl.textContent = ""; }, 2000);
      saveBtn.disabled = false;
    });

    init();
  </script>
</body>
</html>
